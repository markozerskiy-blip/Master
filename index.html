<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="theme-color" content="#111111" />
  <title>Прораб</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#111111; --bg2:#1a1a1a; --bg3:#222222; --bg4:#2a2a2a;
      --border:#333333; --border2:#444444;
      --accent:#d4a017; --accent2:rgba(212,160,23,.08);
      --text:#e8e8e8; --text2:#999999; --text3:#666666;
      --green:#4caf50; --red:#c0392b; --blue:#5b9bd5;
      --mono:'IBM Plex Mono',monospace;
      --sans:'IBM Plex Sans',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;overflow-x:hidden;}
    #app{height:100vh;display:flex;flex-direction:column;}

    .header{background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
    .header-top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;}
    .header-left{display:flex;flex-direction:column;gap:2px;min-width:0;}
    .header-tag{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;}
    .object-selector{display:flex;align-items:center;gap:8px;cursor:pointer;}
    .object-name{font-size:17px;font-weight:700;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;}
    .object-arrow{color:var(--text3);font-size:12px;}
    .header-right{display:flex;align-items:center;gap:10px;}
    .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);transition:background .3s;}
    .sync-dot.offline{background:var(--text3);}
    .search-btn{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:2px 4px;line-height:1;}
    .search-btn.active{color:var(--accent);}

    .search-bar{padding:0 12px 10px;display:none;}
    .search-bar.visible{display:block;}
    .search-input-wrap{position:relative;}
    .search-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;padding:9px 36px 9px 12px;font-size:13px;font-family:var(--mono);color:var(--text);outline:none;}
    .search-input:focus{border-color:var(--accent);}
    .search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;display:none;}
    .search-clear.visible{display:block;}

    .nav{display:flex;border-top:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
    .nav::-webkit-scrollbar{display:none;}
    .nav-btn{flex:1;min-width:72px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);padding:11px 6px;font-size:11px;font-weight:600;font-family:var(--sans);letter-spacing:.3px;cursor:pointer;transition:color .1s,border-color .1s;text-transform:uppercase;white-space:nowrap;}
    .nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
    .nav-badge{background:var(--red);color:#fff;border-radius:3px;font-size:9px;font-family:var(--mono);padding:1px 4px;margin-left:3px;vertical-align:middle;}

    .screens-wrap{flex:1;overflow:hidden;position:relative;}
    .screens-inner{display:flex;height:100%;transition:transform .28s cubic-bezier(.4,0,.2,1);}
    .screen{min-width:100%;height:100%;overflow-y:auto;padding:14px 12px 100px;}

    .date-row{display:flex;gap:6px;align-items:center;margin-bottom:14px;}
    .date-pill{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:8px 16px;font-size:14px;font-weight:700;font-family:var(--mono);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .1s;text-transform:uppercase;}
    .date-pill.active{border-color:var(--accent);color:var(--accent);background:var(--accent2);}
    .date-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:8px 10px;font-size:13px;font-family:var(--mono);color:var(--text);outline:none;min-width:0;}
    .date-input::-webkit-calendar-picker-indicator{filter:invert(.5);}

    .stats-bar{display:flex;gap:16px;padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:14px;}
    .stat-item{display:flex;flex-direction:column;gap:2px;}
    .stat-val{font-family:var(--mono);font-size:18px;font-weight:600;}
    .stat-label{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;}
    .section-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding:16px 0 8px;}

    /* SKELETON */
    .skeleton{background:var(--bg2);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;padding:13px 12px;}
    .skel-line{background:var(--bg3);border-radius:2px;height:11px;margin-bottom:8px;animation:shimmer 1.4s infinite;}
    .skel-line:last-child{margin-bottom:0;}
    .skel-line.w40{width:40%;} .skel-line.w60{width:60%;} .skel-line.w80{width:80%;}
    @keyframes shimmer{0%,100%{opacity:.35}50%{opacity:.8}}

    .u-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;overflow:hidden;}
    .u-card.done{opacity:.75;}
    .u-card.optimistic{opacity:.65;border-style:dashed;}
    .u-main{display:flex;align-items:flex-start;padding:13px 12px;gap:11px;cursor:pointer;}
    .u-rooms{flex-shrink:0;display:flex;flex-direction:column;gap:4px;padding-top:1px;min-width:48px;}
    .u-room{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.2);border-radius:3px;padding:4px 8px;text-align:center;display:block;}
    .u-room.otk-clr{color:var(--blue);background:rgba(91,155,213,.1);border-color:rgba(91,155,213,.2);}
    .u-time{font-family:var(--mono);font-size:11px;color:var(--blue);text-align:center;margin-top:4px;padding:2px 4px;background:rgba(91,155,213,.07);border-radius:2px;}
    .u-body{flex:1;min-width:0;}
    .u-desc{font-size:15px;font-weight:600;color:var(--text);line-height:1.4;}
    .u-card.done .u-desc{text-decoration:line-through;color:var(--text2);}
    .u-workers{display:flex;flex-direction:column;gap:3px;margin-top:7px;}
    .u-worker{font-size:13px;color:var(--text2);font-weight:500;}
    .u-meta-row{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;align-items:center;}
    .u-meta{font-family:var(--mono);font-size:11px;color:var(--text3);}
    .u-meta.edited{color:#9a7a20;}
    .u-check-col{flex-shrink:0;padding-top:2px;}
    .check-btn{width:28px;height:28px;border-radius:3px;border:1px solid var(--border2);background:none;cursor:pointer;font-size:13px;color:transparent;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .check-btn.done{background:var(--green);border-color:var(--green);color:#fff;}
    .check-btn:active{transform:scale(.85);}

    .u-expand{border-top:1px solid var(--border);background:var(--bg3);}
    .u-actions{display:flex;gap:6px;padding:10px 12px;flex-wrap:wrap;align-items:center;}
    .act-btn{font-family:var(--mono);font-size:11px;font-weight:500;border:1px solid var(--border2);border-radius:3px;padding:5px 10px;background:none;color:var(--text2);cursor:pointer;}
    .act-btn:active{background:var(--bg4);}
    .act-btn.edit{color:var(--accent);border-color:rgba(212,160,23,.35);}
    .act-btn.move{color:var(--blue);border-color:rgba(91,155,213,.35);}
    .act-btn.move-today{color:var(--green);border-color:rgba(76,175,80,.35);}
    .act-btn.del{color:var(--red);border-color:rgba(192,57,43,.35);}

    .edit-log{border-top:1px solid var(--border);padding:10px 12px;background:var(--bg);}
    .edit-log-title{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
    .edit-log-item{padding:6px 0;border-bottom:1px solid var(--border);}
    .edit-log-item:last-child{border-bottom:none;}
    .edit-log-who{font-family:var(--mono);font-size:10px;color:var(--accent);}
    .edit-log-what{font-size:12px;color:var(--text2);margin-top:2px;}
    .edit-log-old{font-family:var(--mono);font-size:11px;color:var(--text3);text-decoration:line-through;margin-top:1px;}

    .hist-date-block{margin-bottom:20px;}
    .hist-date-header{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;border-bottom:1px solid var(--border);margin-bottom:8px;}
    .hist-date-label{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text2);}
    .hist-date-stat{font-family:var(--mono);font-size:11px;color:var(--text3);}
    .hist-load-more{width:100%;background:none;border:1px dashed var(--border2);border-radius:3px;padding:12px;font-size:12px;font-family:var(--mono);color:var(--text3);cursor:pointer;margin-top:4px;}
    .hist-load-more:active{background:var(--bg2);}

    .empty{padding:60px 0;text-align:center;}
    .empty-code{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:1px;margin-bottom:10px;}
    .empty-text{font-size:14px;color:var(--text3);}
    .no-results{padding:32px 0;text-align:center;}
    .no-results-text{font-family:var(--mono);font-size:12px;color:var(--text3);}

    /* FAB with label */
    .fab-wrap{position:fixed;bottom:24px;right:16px;display:flex;align-items:center;gap:8px;z-index:90;}
    .fab-label{font-family:var(--mono);font-size:11px;font-weight:600;color:#111;background:var(--accent);border-radius:3px;padding:5px 10px;opacity:0;transform:translateX(6px);transition:opacity .15s,transform .15s;pointer-events:none;white-space:nowrap;box-shadow:0 2px 8px rgba(212,160,23,.25);}
    .fab-label.visible{opacity:1;transform:translateX(0);}
    .fab{width:52px;height:52px;border-radius:4px;background:var(--accent);border:none;color:#111;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(212,160,23,.35);transition:transform .1s;flex-shrink:0;}
    .fab:active{transform:scale(.94);}

    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
    .modal{background:var(--bg2);border-top:1px solid var(--border2);border-radius:6px 6px 0 0;padding:20px 18px 36px;width:100%;max-width:480px;animation:slideUp .18s ease-out;max-height:90vh;overflow-y:auto;}
    @keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-handle{width:32px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 18px;}
    .modal-title{font-size:16px;font-weight:700;margin-bottom:18px;}
    .field-wrap{margin-bottom:12px;}
    .field-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block;}
    .field-hint{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:4px;}
    input[type="text"],input[type="number"],input[type="time"],textarea,select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;padding:12px 14px;font-size:14px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .1s;-webkit-appearance:none;}
    input:focus,textarea:focus,select:focus{border-color:var(--accent);}
    textarea{min-height:76px;resize:none;}
    .modal-btns{display:flex;gap:8px;margin-top:4px;}
    .btn-cancel{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;padding:14px;font-size:13px;font-weight:600;font-family:var(--sans);color:var(--text2);cursor:pointer;}
    .btn-submit{flex:2;background:var(--accent);border:none;border-radius:3px;padding:14px;font-size:13px;font-weight:700;font-family:var(--sans);color:#111;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;}
    .btn-submit:disabled{opacity:.4;}

    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);border-radius:3px;padding:10px 18px;font-family:var(--mono);font-size:12px;color:var(--text);z-index:300;white-space:nowrap;animation:toastIn .15s ease-out;}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

    .obj-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
    .obj-row{display:flex;gap:8px;align-items:center;}
    .obj-item{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
    .obj-item:active{background:var(--bg4);}
    .obj-item.selected{border-color:var(--accent);}
    .obj-item-name{font-size:14px;font-weight:600;}
    .obj-item-check{font-family:var(--mono);font-size:12px;color:var(--accent);}
    .obj-del{font-family:var(--mono);font-size:11px;color:var(--red);border:1px solid rgba(192,57,43,.3);border-radius:3px;padding:6px 10px;background:none;cursor:pointer;flex-shrink:0;}

    .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;display:flex;align-items:center;justify-content:center;}
    .confirm-box{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:24px 20px;width:calc(100% - 48px);max-width:340px;animation:fadeIn .15s;}
    @keyframes fadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
    .confirm-title{font-size:15px;font-weight:700;margin-bottom:8px;}
    .confirm-text{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5;}
    .confirm-btns{display:flex;gap:8px;}
    .confirm-cancel{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;padding:12px;font-size:13px;font-weight:600;font-family:var(--sans);color:var(--text2);cursor:pointer;}
    .confirm-ok{flex:1;background:var(--red);border:none;border-radius:3px;padding:12px;font-size:13px;font-weight:700;font-family:var(--sans);color:#fff;cursor:pointer;}
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="header-left">
        <div class="header-tag">Текущий объект</div>
        <div class="object-selector" onclick="openObjectPicker()">
          <div class="object-name" id="current-object-name">Загрузка...</div>
          <div class="object-arrow">&#9662;</div>
        </div>
      </div>
      <div class="header-right">
        <button class="search-btn" id="search-toggle-btn" onclick="toggleSearch()">&#9906;</button>
        <div class="sync-dot offline" id="sync-dot"></div>
      </div>
    </div>
    <div class="search-bar" id="search-bar">
      <div class="search-input-wrap">
        <input class="search-input" id="search-input" type="text" placeholder="Поиск..." oninput="onSearchInput()" />
        <button class="search-clear" id="search-clear" onclick="clearSearch()">&#215;</button>
      </div>
    </div>
    <div class="nav">
      <button class="nav-btn active" onclick="goTo(0)" id="tab-0">Задачи<span class="nav-badge" id="task-badge" style="display:none">0</span></button>
      <button class="nav-btn" onclick="goTo(1)" id="tab-1">ОТК<span class="nav-badge" id="otk-badge" style="display:none">0</span></button>
      <button class="nav-btn" onclick="goTo(2)" id="tab-2">Материалы<span class="nav-badge" id="mat-badge" style="display:none">0</span></button>
      <button class="nav-btn" onclick="goTo(3)" id="tab-3">История</button>
    </div>
  </div>

  <div class="screens-wrap" id="screens-wrap">
    <div class="screens-inner" id="screens-inner">
      <div class="screen" id="screen-0">
        <div class="date-row">
          <div class="date-pill active" id="pill-today" onclick="setDate('today')">Сегодня</div>
          <div class="date-pill" id="pill-tomorrow" onclick="setDate('tomorrow')">Завтра</div>
          <input type="date" class="date-input" id="date-picker" onchange="setDate('custom')" />
        </div>
        <div class="stats-bar">
          <div class="stat-item"><div class="stat-val" id="stat-total">0</div><div class="stat-label">Всего</div></div>
          <div class="stat-item"><div class="stat-val" id="stat-done">0</div><div class="stat-label">Готово</div></div>
          <div class="stat-item"><div class="stat-val" id="stat-left">0</div><div class="stat-label">Осталось</div></div>
        </div>
        <div id="tasks-list"></div>
      </div>
      <div class="screen" id="screen-1"><div id="otk-list"></div></div>
      <div class="screen" id="screen-2"><div id="materials-list"></div></div>
      <div class="screen" id="screen-3"><div id="history-list"></div></div>
    </div>
  </div>

  <div class="fab-wrap" id="fab-wrap">
    <div class="fab-label" id="fab-label"></div>
    <button class="fab" onclick="openModal()">+</button>
  </div>
</div>

<!-- TASK MODAL -->
<div class="overlay" id="modal-task" style="display:none" onclick="closeModalOutside(event,'modal-task')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-task-title">Новая задача</div>
    <input type="hidden" id="edit-task-id" />
    <div class="field-wrap">
      <label class="field-label">№ Помещений</label>
      <input type="text" id="f-room" placeholder="101 102 103" />
      <div class="field-hint">Через пробел — в столбик на карточке</div>
    </div>
    <div class="field-wrap">
      <label class="field-label">Описание работ</label>
      <textarea id="f-desc" placeholder="Что нужно сделать..."></textarea>
    </div>
    <div class="field-wrap">
      <label class="field-label">Исполнители</label>
      <input type="text" id="f-workers" placeholder="Иванов Петров Сидоров" />
      <div class="field-hint">Через пробел — в столбик на карточке</div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-task')">Отмена</button>
      <button class="btn-submit" id="btn-task-submit" onclick="submitTask()">Добавить</button>
    </div>
  </div>
</div>

<!-- MAT MODAL -->
<div class="overlay" id="modal-mat" style="display:none" onclick="closeModalOutside(event,'modal-mat')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-mat-title">Запрос материалов</div>
    <input type="hidden" id="edit-mat-id" />
    <div class="field-wrap">
      <label class="field-label">Что нужно?</label>
      <textarea id="f-mat" placeholder="Цемент М400 — 10 мешков..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-mat')">Отмена</button>
      <button class="btn-submit" id="btn-mat-submit" onclick="submitMaterial()">Добавить</button>
    </div>
  </div>
</div>

<!-- OTK MODAL -->
<div class="overlay" id="modal-otk" style="display:none" onclick="closeModalOutside(event,'modal-otk')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-otk-title">Новая запись ОТК</div>
    <input type="hidden" id="edit-otk-id" />
    <div class="field-wrap">
      <label class="field-label">№ Помещений</label>
      <input type="text" id="f-otk-room" placeholder="101 102" />
      <div class="field-hint">Через пробел — в столбик</div>
    </div>
    <div class="field-wrap">
      <label class="field-label">Время проведения</label>
      <input type="time" id="f-otk-time" />
    </div>
    <div class="field-wrap">
      <label class="field-label">Описание работ</label>
      <textarea id="f-otk-desc" placeholder="Описание..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-otk')">Отмена</button>
      <button class="btn-submit" id="btn-otk-submit" onclick="submitOtk()">Добавить</button>
    </div>
  </div>
</div>

<!-- ADD OBJECT MODAL -->
<div class="overlay" id="modal-add-object" style="display:none" onclick="closeModalOutside(event,'modal-add-object')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Новый объект</div>
    <div class="field-wrap">
      <label class="field-label">Название</label>
      <input type="text" id="f-new-object" placeholder="Например: ЖК Северный, корп. 2" />
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-add-object')">Отмена</button>
      <button class="btn-submit" onclick="submitNewObject()">Добавить</button>
    </div>
  </div>
</div>

<!-- OBJECT PICKER -->

function getTodayStr(){return new Date().toISOString().slice(0,10);}

// ── SWIPE (improved: won't trigger during vertical scroll) ──
document.addEventListener('DOMContentLoaded',()=>{
  const w=document.getElementById('screens-wrap');
  w.addEventListener('touchstart',e=>{
    touchStartX=e.touches[0].clientX;
    touchStartY=e.touches[0].clientY;
    isSwiping=false;
    const scr=document.getElementById('screen-'+currentTab);
    touchStartScrollTop=scr?scr.scrollTop:0;
  },{passive:true});
  w.addEventListener('touchmove',e=>{
    const dx=Math.abs(e.touches[0].clientX-touchStartX);
    const dy=Math.abs(e.touches[0].clientY-touchStartY);
    const scr=document.getElementById('screen-'+currentTab);
    const didScroll=scr&&Math.abs(scr.scrollTop-touchStartScrollTop)>4;
    if(didScroll){isSwiping=false;return;}
    if(!isSwiping&&dx>dy&&dx>14)isSwiping=true;
  },{passive:true});
  w.addEventListener('touchend',e=>{
    if(!isSwiping)return;
    const dx=e.changedTouches[0].clientX-touchStartX;
    if(Math.abs(dx)<60)return;
    if(dx<0&&currentTab<3)goTo(currentTab+1);
    else if(dx>0&&currentTab>0)goTo(currentTab-1);
  },{passive:true});
  initApp();
});

function goTo(idx){
  currentTab=idx;
  document.getElementById('screens-inner').style.transform=`translateX(-${idx*100}%)`;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const fw=document.getElementById('fab-wrap');
  const fl=document.getElementById('fab-label');
  fw.style.display=idx===3?'none':'flex';
  fl.textContent=FAB_LABELS[idx]||'';
  fl.classList.toggle('visible',!!(FAB_LABELS[idx]));
  localStorage.setItem('lastTab',idx);
  if(searchVisible&&idx!==0)toggleSearch(false);
  const ph=['Поиск по задачам...','Поиск по ОТК...','Поиск по материалам...',''];
  const si=document.getElementById('search-input');
  if(si)si.placeholder=ph[idx]||'Поиск...';
  if(idx===3){historyDaysShown=7;renderHistory();}
  if(idx===1)loadOtk();
}

// ── SEARCH ──
function toggleSearch(force){
  searchVisible=typeof force==='boolean'?force:!searchVisible;
  document.getElementById('search-bar').classList.toggle('visible',searchVisible);
  document.getElementById('search-toggle-btn').classList.toggle('active',searchVisible);
  if(searchVisible)setTimeout(()=>document.getElementById('search-input').focus(),80);
  else clearSearch();
}
function onSearchInput(){
  const v=document.getElementById('search-input').value;
  searchQuery=v.toLowerCase();
  document.getElementById('search-clear').classList.toggle('visible',v.length>0);
  renderCurrentTab();
}
function clearSearch(){
  document.getElementById('search-input').value='';
  searchQuery='';
  document.getElementById('search-clear').classList.remove('visible');
  renderCurrentTab();
}
function renderCurrentTab(){
  if(currentTab===0)renderTasks();
  else if(currentTab===1)renderOtk();
  else if(currentTab===2)renderMaterials();
  else renderHistory();
}
function matchSearch(text){return!searchQuery||String(text||'').toLowerCase().includes(searchQuery);}

// ── CONFIRM ──
function confirm2(title,text,onOk){
  const div=document.createElement('div');div.className='confirm-overlay';
  div.innerHTML=`<div class="confirm-box"><div class="confirm-title">${esc(title)}</div><div class="confirm-text">${esc(text)}</div><div class="confirm-btns"><button class="confirm-cancel">Отмена</button><button class="confirm-ok">Удалить</button></div></div>`;
  document.body.appendChild(div);
  div.querySelector('.confirm-cancel').onclick=()=>div.remove();
  div.querySelector('.confirm-ok').onclick=()=>{div.remove();onOk();};
}

// ── SKELETON ──
function showSkeleton(id,n=3){
  const el=document.getElementById(id);if(!el)return;
  el.innerHTML=Array(n).fill(0).map(()=>`<div class="skeleton"><div class="skel-line w40"></div><div class="skel-line w80"></div><div class="skel-line w60"></div></div>`).join('');
}

// ── REALTIME ──
function subscribeRealtime(){
  db.channel('rt-tasks')
    .on('postgres_changes',{event:'*',schema:'public',table:'tasks'},handleTaskChange)
    .subscribe(s=>{document.getElementById('sync-dot').classList.toggle('offline',s!=='SUBSCRIBED');});
  db.channel('rt-mats')
    .on('postgres_changes',{event:'*',schema:'public',table:'materials'},()=>loadMaterials())
    .subscribe();
  db.channel('rt-mat-edits')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'material_edits'},payload=>{
      const e=payload.new;
      if(!matEditLogs[e.material_id])matEditLogs[e.material_id]=[];
      matEditLogs[e.material_id].unshift(e);renderMaterials();
    }).subscribe();
  db.channel('rt-edits')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'task_edits'},payload=>{
      const e=payload.new;
      if(!editLogs[e.task_id])editLogs[e.task_id]=[];
      editLogs[e.task_id].unshift(e);
      renderTasks();if(currentTab===3)renderHistory();
    }).subscribe();
  db.channel('rt-otk')
    .on('postgres_changes',{event:'*',schema:'public',table:'otk'},()=>{if(currentTab===1)loadOtk();})
    .subscribe();
}

function handleTaskChange(payload){
  const{eventType,new:n,old:o}=payload;
  if(eventType==='INSERT'){if(!tasks.find(t=>t.id===n.id))tasks.push(n);}
  else if(eventType==='UPDATE'){const i=tasks.findIndex(t=>t.id===n.id);if(i>=0)tasks[i]=n;else tasks.push(n);}
  else if(eventType==='DELETE'){
    const delId=o&&o.id;
    if(delId)tasks=tasks.filter(t=>t.id!==delId);
    else{loadTasks();return;}
  }
  renderTasks();if(currentTab===3)renderHistory();
}

// ── HELPERS ──
function roomsHtml(s,isOtk){return splitSpace(s).map(r=>`<span class="u-room${isOtk?' otk-clr':''}">${esc(r)}</span>`).join('');}
function workersHtml(s){if(!s)return'';return`<div class="u-workers">${splitSpace(s).map(w=>`<span class="u-worker">&#128119; ${esc(w)}</span>`).join('')}</div>`;}
function editLogHtml(logs){
  if(!logs||!logs.length)return'';
  return`<div class="edit-log"><div class="edit-log-title">// Лог изменений</div>${logs.map(l=>`<div class="edit-log-item"><div class="edit-log-who">${esc(l.author||'Мастер')} &middot; ${formatDt(l.created_at)}</div><div class="edit-log-what">${fieldName(l.field)}: ${esc(l.new_value)}</div>${l.old_value?`<div class="edit-log-old">Было: ${esc(l.old_value)}</div>`:''}</div>`).join('')}</div>`;
}
function matEditLogHtml(logs){
  if(!logs||!logs.length)return'';
  return`<div class="edit-log"><div class="edit-log-title">// Лог изменений</div>${logs.map(l=>`<div class="edit-log-item"><div class="edit-log-who">Мастер &middot; ${formatDt(l.created_at)}</div><div class="edit-log-what">Текст: ${esc(l.new_value)}</div>${l.old_value?`<div class="edit-log-old">Было: ${esc(l.old_value)}</div>`:''}</div>`).join('')}</div>`;
}
function fieldName(f){return{description:'Описание',workers:'Исполнители',room:'Помещение'}[f]||f;}

function copyText(text){
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>showToast('&#10003; Скопировано')).catch(()=>fallbackCopy(text));}
  else fallbackCopy(text);
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');showToast('\u2713 Скопировано');}catch(e){}
  document.body.removeChild(ta);
}

// ── RENDER TASKS ──
function renderTasks(){
  const list=document.getElementById('tasks-list');
  const filtered=tasks.filter(t=>t.date===filterDate);
  const pending=filtered.filter(t=>!t.done);
  const done=filtered.filter(t=>t.done);
  document.getElementById('stat-total').textContent=filtered.length;
  document.getElementById('stat-done').textContent=done.length;
  document.getElementById('stat-left').textContent=pending.length;
  const todayPending=tasks.filter(t=>t.date===getTodayStr()&&!t.done).length;
  const tb=document.getElementById('task-badge');
  tb.style.display=todayPending?'inline':'none';
  tb.textContent=todayPending;

  const fPending=searchQuery?pending.filter(t=>matchSearch(t.description)||matchSearch(t.room)||matchSearch(t.workers)):pending;
  const fDone=searchQuery?done.filter(t=>matchSearch(t.description)||matchSearch(t.room)||matchSearch(t.workers)):done;

  if(!filtered.length){list.innerHTML=`<div class="empty"><div class="empty-code">// ЗАДАЧ НЕТ</div><div class="empty-text">${formatDate(filterDate)}</div></div>`;return;}
  if(searchQuery&&!fPending.length&&!fDone.length){list.innerHTML='<div class="no-results"><div class="no-results-text">// Ничего не найдено</div></div>';return;}
  let html='';
  fPending.forEach(t=>{html+=taskCardHtml(t,false);});
  if(fDone.length){html+=`<div class="section-label">// Выполнено &mdash; ${fDone.length}</div>`;fDone.forEach(t=>{html+=taskCardHtml(t,false);});}
  list.innerHTML=html;
}

function taskCardHtml(t,histMode){
  const today=getTodayStr(),tomorrow=getTomorrowStr();
  const canEdit=!histMode&&(t.date===today||t.date===tomorrow);
  const canMoveNext=!t.done&&t.date===today&&!histMode;
  const canMoveToday=!t.done&&t.date===tomorrow&&!histMode;
  const logs=editLogs[t.id]||[];
  const uid='tc'+t.id.replace(/-/g,'');
  const copyVal=[t.room,t.description,t.workers].filter(Boolean).join(' | ');
  return`<div class="u-card ${t.done?'done':''} ${t._optimistic?'optimistic':''}">
    <div class="u-main" onclick="toggleExpand('${uid}')">
      <div class="u-rooms">${roomsHtml(t.room,false)}</div>
      <div class="u-body">
        <div class="u-desc">${esc(t.description)}</div>
        ${workersHtml(t.workers)}
        <div class="u-meta-row">${logs.length?'<span class="u-meta edited">&#9998; изм.</span>':''}</div>
      </div>
      <div class="u-check-col">
        ${!histMode
          ?`<button class="check-btn ${t.done?'done':''}" onclick="event.stopPropagation();toggleTask('${t.id}',${t.done})">${t.done?'&#10003;':''}</button>`
          :`<span style="font-family:var(--mono);font-size:13px;color:${t.done?'var(--green)':'var(--text3)'}">${t.done?'&#10003;':'&mdash;'}</span>`}
      </div>
    </div>
    <div id="${uid}" style="display:none">
      <div class="u-expand"><div class="u-actions">
        <span style="font-family:var(--mono);font-size:10px;color:var(--text3);flex:1">${formatDate(t.date)}</span>
        ${canEdit?`<button class="act-btn edit" onclick="openEditTask('${t.id}')">&#9998; Ред.</button>`:''}
        ${canMoveNext?`<button class="act-btn move" onclick="moveTask('${t.id}','next')">&rarr; Завтра</button>`:''}
        ${canMoveToday?`<button class="act-btn move-today" onclick="moveTask('${t.id}','today')">&larr; Сегодня</button>`:''}
        <button class="act-btn" onclick="copyText('${esc(copyVal)}')">&#9138; Копировать</button>
        ${!histMode?`<button class="act-btn del" onclick="confirmDeleteTask('${t.id}')">&#10005;</button>`:''}
      </div></div>
      ${editLogHtml(logs)}
    </div>
  </div>`;
}

// ── RENDER HISTORY ──
function renderHistory(){
  const list=document.getElementById('history-list');
  if(!tasks.length){list.innerHTML='<div class="empty"><div class="empty-code">// ИСТОРИЯ ПУСТА</div></div>';return;}
  const groups={};
  tasks.forEach(t=>{if(!groups[t.date])groups[t.date]=[];groups[t.date].push(t);});
  const allDates=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  const visDates=searchQuery?allDates:allDates.slice(0,historyDaysShown);
  const today=getTodayStr(),tomorrow=getTomorrowStr();
  let html='';let shown=0;
  visDates.forEach(date=>{
    const arr=searchQuery?groups[date].filter(t=>matchSearch(t.description)||matchSearch(t.room)||matchSearch(t.workers)):groups[date];
    if(!arr.length)return;shown++;
    const doneC=arr.filter(t=>t.done).length;
    const label=date===today?'Сегодня':date===tomorrow?'Завтра':formatDate(date);
    html+=`<div class="hist-date-block"><div class="hist-date-header"><div class="hist-date-label">${label}</div><div class="hist-date-stat">${doneC}/${arr.length}</div></div>${arr.map(t=>taskCardHtml(t,true)).join('')}</div>`;
  });
  if(!shown)html='<div class="no-results"><div class="no-results-text">// Ничего не найдено</div></div>';
  else if(!searchQuery&&allDates.length>historyDaysShown)html+=`<button class="hist-load-more" onclick="loadMoreHistory()">Загрузить ещё (${allDates.length-historyDaysShown} дн.)</button>`;
  list.innerHTML=html;
}
function loadMoreHistory(){historyDaysShown+=7;renderHistory();}

// ── RENDER MATERIALS ──
function renderMaterials(){
  const list=document.getElementById('materials-list');
  const pendingAll=materials.filter(m=>!m.done);
  const badge=document.getElementById('mat-badge');
  badge.style.display=pendingAll.length?'inline':'none';
  badge.textContent=pendingAll.length;
  if(!materials.length){list.innerHTML='<div class="empty"><div class="empty-code">// ЗАПРОСОВ НЕТ</div></div>';return;}
  const fPending=searchQuery?pendingAll.filter(m=>matchSearch(m.text)):pendingAll;
  const fDone=searchQuery?materials.filter(m=>m.done&&matchSearch(m.text)):materials.filter(m=>m.done);
  if(searchQuery&&!fPending.length&&!fDone.length){list.innerHTML='<div class="no-results"><div class="no-results-text">// Ничего не найдено</div></div>';return;}
  let html='';
  fPending.forEach(m=>{html+=matCardHtml(m);});
  if(fDone.length){html+=`<div class="section-label">// Получено &mdash; ${fDone.length}</div>`;fDone.forEach(m=>{html+=matCardHtml(m);});}
  list.innerHTML=html;
}

function matCardHtml(m){

      <div class="u-body">
        <div class="u-desc">${esc(m.text)}</div>

      </div>

      </div>
    </div>
    <div id="${uid}" style="display:none">
      <div class="u-expand"><div class="u-actions"><span style="flex:1"></span>
        <button class="act-btn" onclick="copyText('${esc(m.text)}')">&#9138; Копировать</button>
        <button class="act-btn edit" onclick="openEditMat('${m.id}')">&#9998; Ред.</button>

// ── RENDER OTK ──
function renderOtk(){
  const list=document.getElementById('otk-list');
  const ob=document.getElementById('otk-badge');
  ob.style.display=otkItems.length?'inline':'none';
  ob.textContent=otkItems.length;
  if(!otkItems.length){list.innerHTML='<div class="empty"><div class="empty-code">// ЗАПИСЕЙ НЕТ</div></div>';return;}
  const filtered=searchQuery?otkItems.filter(o=>matchSearch(o.description)||matchSearch(o.room)):otkItems;
  if(searchQuery&&!filtered.length){list.innerHTML='<div class="no-results"><div class="no-results-text">// Ничего не найдено</div></div>';return;}
  list.innerHTML=filtered.map(o=>{
    const uid='oc'+o.id.replace(/-/g,'');
    const copyVal=[o.room,o.scheduled_time?formatTime(o.scheduled_time):'',o.description].filter(Boolean).join(' | ');
    return`<div class="u-card ${o._optimistic?'optimistic':''}">
      <div class="u-main" onclick="toggleExpand('${uid}')">
        <div class="u-rooms">
          ${roomsHtml(o.room,true)}
          ${o.scheduled_time?`<div class="u-time">${formatTime(o.scheduled_time)}</div>`:''}
        </div>
        <div class="u-body"><div class="u-desc">${esc(o.description)}</div></div>
      </div>
      <div id="${uid}" style="display:none">
        <div class="u-expand"><div class="u-actions"><span style="flex:1"></span>
          <button class="act-btn" onclick="copyText('${esc(copyVal)}')">&#9138; Копировать</button>
          <button class="act-btn edit" onclick="openEditOtk('${o.id}')">&#9998; Ред.</button>
          <button class="act-btn del" onclick="confirmDeleteOtk('${o.id}')">&#10005;</button>
        </div></div>
      </div>
    </div>`;
  }).join('');
}

function toggleExpand(id){const el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'block':'none';}

// ── DATE ──
function setDate(type){
  const today=getTodayStr(),tomorrow=getTomorrowStr();
  if(type==='today')filterDate=today;
  else if(type==='tomorrow')filterDate=tomorrow;
  else filterDate=document.getElementById('date-picker').value;
  document.getElementById('pill-today').classList.toggle('active',filterDate===today);
  document.getElementById('pill-tomorrow').classList.toggle('active',filterDate===tomorrow);
  if(type!=='custom')document.getElementById('date-picker').value=filterDate;
  renderTasks();
}

// ── ACTIONS ──
async function toggleTask(id,isDone){
  const t=tasks.find(t=>t.id===id);if(t)t.done=!isDone;
  renderTasks();
  await db.from('tasks').update({done:!isDone}).eq('id',id);
}
async function moveTask(id,dir){
  const t=tasks.find(t=>t.id===id);
  const newDate=dir==='next'?getTomorrowStr():getTodayStr();
  if(t){t.date=newDate;t.done=false;}
  renderTasks();
  await db.from('tasks').update({date:newDate,done:false}).eq('id',id);
  showToast(dir==='next'?'&rarr; Перенесено на завтра':'&larr; Перенесено на сегодня');
}
function confirmDeleteTask(id){
  confirm2('Удалить задачу?','Это действие нельзя отменить.',async()=>{
    tasks=tasks.filter(t=>t.id!==id);renderTasks();
    const{error}=await db.from('tasks').delete().eq('id',id);
    if(error){showToast('Ошибка удаления');await loadTasks();}
    else showToast('\u2713 Задача удалена');
  });
}
async function toggleMat(id,isDone){
  const m=materials.find(m=>m.id===id);if(m)m.done=!isDone;
  renderMaterials();
  await db.from('materials').update({done:!isDone}).eq('id',id);
}
function confirmDeleteMat(id){
  confirm2('Удалить запрос?','Это действие нельзя отменить.',async()=>{
    materials=materials.filter(m=>m.id!==id);renderMaterials();
    const{error}=await db.from('materials').delete().eq('id',id);
    if(error){showToast('Ошибка удаления');await loadMaterials();}
    else showToast('\u2713 Запрос удалён');
  });
}
function confirmDeleteOtk(id){
  confirm2('Удалить запись ОТК?','Это действие нельзя отменить.',async()=>{
    otkItems=otkItems.filter(o=>o.id!==id);renderOtk();
    const{error}=await db.from('otk').delete().eq('id',id);
    if(error){showToast('Ошибка удаления');await loadOtk();}
    else showToast('\u2713 Запись удалена');
  });
}

// ── MODALS ──

  if(currentTab===2){
    document.getElementById('edit-mat-id').value='';
    document.getElementById('modal-mat-title').textContent='Запрос материалов';
    document.getElementById('btn-mat-submit').textContent='Добавить';
    document.getElementById('f-mat').value='';
    document.getElementById('modal-mat').style.display='flex';
    setTimeout(()=>document.getElementById('f-mat').focus(),100);
  }else if(currentTab===1){
    document.getElementById('edit-otk-id').value='';
    document.getElementById('modal-otk-title').textContent='Новая запись ОТК';
    document.getElementById('btn-otk-submit').textContent='Добавить';
    document.getElementById('f-otk-room').value='';
    document.getElementById('f-otk-time').value='';
    document.getElementById('f-otk-desc').value='';
    document.getElementById('modal-otk').style.display='flex';
    setTimeout(()=>document.getElementById('f-otk-room').focus(),100);
  }else{
    document.getElementById('edit-task-id').value='';
    document.getElementById('modal-task-title').textContent='Новая задача';
    document.getElementById('btn-task-submit').textContent='Добавить';
    document.getElementById('f-room').value='';
    document.getElementById('f-desc').value='';
    document.getElementById('f-workers').value='';
    document.getElementById('modal-task').style.display='flex';
    setTimeout(()=>document.getElementById('f-room').focus(),100);

}
function openEditTask(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  document.getElementById('edit-task-id').value=id;
  document.getElementById('modal-task-title').textContent='Редактировать задачу';
  document.getElementById('btn-task-submit').textContent='Сохранить';
  document.getElementById('f-room').value=t.room;
  document.getElementById('f-desc').value=t.description;
  document.getElementById('f-workers').value=t.workers||'';

}
function openEditOtk(id){
  const o=otkItems.find(o=>o.id===id);if(!o)return;
  document.getElementById('edit-otk-id').value=id;
  document.getElementById('modal-otk-title').textContent='Редактировать ОТК';
  document.getElementById('btn-otk-submit').textContent='Сохранить';
  document.getElementById('f-otk-room').value=o.room;
  document.getElementById('f-otk-time').value=o.scheduled_time?formatTime(o.scheduled_time):'';
  document.getElementById('f-otk-desc').value=o.description;
  document.getElementById('modal-otk').style.display='flex';
}
function openEditMat(id){
  const m=materials.find(m=>m.id===id);if(!m)return;
  document.getElementById('edit-mat-id').value=id;
  document.getElementById('modal-mat-title').textContent='Редактировать запрос';
  document.getElementById('btn-mat-submit').textContent='Сохранить';
  document.getElementById('f-mat').value=m.text;
  document.getElementById('modal-mat').style.display='flex';
  setTimeout(()=>document.getElementById('f-mat').focus(),100);
}
function closeModal(id){document.getElementById(id).style.display='none';}
function closeModalOutside(e,id){if(e.target.classList.contains('overlay'))closeModal(id);}

// ── SUBMIT TASK ──
async function submitTask(){
  const roomRaw=document.getElementById('f-room').value.trim();
  const desc=document.getElementById('f-desc').value.trim();
  const workersRaw=document.getElementById('f-workers').value.trim();
  const editId=document.getElementById('edit-task-id').value;
  if(!roomRaw||!desc){showToast('Заполните номер и описание');return;}
  const btn=document.getElementById('btn-task-submit');btn.disabled=true;
  if(editId){
    const old=tasks.find(t=>t.id===editId);
    const changes=[];
    if(old.description!==desc)changes.push({task_id:editId,author:'Мастер',field:'description',old_value:old.description,new_value:desc});
    if((old.workers||'')!==workersRaw)changes.push({task_id:editId,author:'Мастер',field:'workers',old_value:old.workers||'',new_value:workersRaw});
    if(old.room!==roomRaw)changes.push({task_id:editId,author:'Мастер',field:'room',old_value:old.room,new_value:roomRaw});
    if(old){old.description=desc;old.workers=workersRaw;old.room=roomRaw;}
    renderTasks();closeModal('modal-task');
    await db.from('tasks').update({room:roomRaw,description:desc,workers:workersRaw}).eq('id',editId);
    if(changes.length){
      await db.from('task_edits').insert(changes);
      if(!editLogs[editId])editLogs[editId]=[];
      changes.forEach(c=>editLogs[editId].unshift({...c,created_at:new Date().toISOString()}));
      renderTasks();if(currentTab===3)renderHistory();
    }
    showToast('\u2713 Сохранено');
  }else{
    const tempId='tmp-'+Date.now();
    tasks.push({id:tempId,room:roomRaw,description:desc,workers:workersRaw,date:filterDate,done:false,author:'Мастер',object_id:currentObjectId,_optimistic:true,created_at:new Date().toISOString()});
    renderTasks();closeModal('modal-task');
    document.getElementById('f-room').value='';document.getElementById('f-desc').value='';document.getElementById('f-workers').value='';
    const{data,error}=await db.from('tasks').insert({room:roomRaw,description:desc,workers:workersRaw,date:filterDate,done:false,author:'Мастер',object_id:currentObjectId}).select().single();
    tasks=tasks.filter(t=>t.id!==tempId);
    if(!error&&data)tasks.push(data);
    renderTasks();
    if(!error)showToast('\u2713 Задача добавлена');else showToast('Ошибка: '+error.message);
  }
  btn.disabled=false;
}

// ── SUBMIT MATERIAL ──
async function submitMaterial(){
  const text=document.getElementById('f-mat').value.trim();
  if(!text){showToast('Введите описание');return;}
  const editId=document.getElementById('edit-mat-id').value;
  const btn=document.getElementById('btn-mat-submit');btn.disabled=true;
  if(editId){
    const old=materials.find(m=>m.id===editId);
    const oldText=old?old.text:'';
    if(old)old.text=text;
    renderMaterials();closeModal('modal-mat');
    await db.from('materials').update({text}).eq('id',editId);
    if(oldText!==text){
      const logEntry={material_id:editId,author:'Мастер',old_value:oldText,new_value:text};
      await db.from('material_edits').insert(logEntry);
      if(!matEditLogs[editId])matEditLogs[editId]=[];
      matEditLogs[editId].unshift({...logEntry,created_at:new Date().toISOString()});
      renderMaterials();
    }
    showToast('\u2713 Сохранено');
  }else{
    const tempId='tmp-'+Date.now();
    materials.unshift({id:tempId,text,date:getTodayStr(),done:false,object_id:currentObjectId,_optimistic:true});
    renderMaterials();closeModal('modal-mat');
    document.getElementById('f-mat').value='';
    const{data,error}=await db.from('materials').insert({text,date:getTodayStr(),done:false,object_id:currentObjectId}).select().single();
    materials=materials.filter(m=>m.id!==tempId);
    if(!error&&data)materials.unshift(data);
    renderMaterials();
    if(!error)showToast('\u2713 Запрос добавлен');else showToast('Ошибка: '+error.message);
  }
  btn.disabled=false;
}

// ── SUBMIT OTK ──
async function submitOtk(){
  const roomRaw=document.getElementById('f-otk-room').value.trim();
  const timeVal=document.getElementById('f-otk-time').value.trim();
  const desc=document.getElementById('f-otk-desc').value.trim();
  const editId=document.getElementById('edit-otk-id').value;
  if(!roomRaw||!desc){showToast('Заполните помещение и описание');return;}
  const btn=document.getElementById('btn-otk-submit');btn.disabled=true;
  if(editId){
    const o=otkItems.find(o=>o.id===editId);
    if(o){o.room=roomRaw;o.description=desc;o.scheduled_time=timeVal||null;}
    renderOtk();closeModal('modal-otk');
    await db.from('otk').update({room:roomRaw,description:desc,scheduled_time:timeVal||null}).eq('id',editId);
    showToast('\u2713 Сохранено');
  }else{
    const tempId='tmp-'+Date.now();
    otkItems.unshift({id:tempId,room:roomRaw,description:desc,scheduled_time:timeVal||null,object_id:currentObjectId,created_at:new Date().toISOString(),_optimistic:true});
    renderOtk();closeModal('modal-otk');
    document.getElementById('f-otk-room').value='';document.getElementById('f-otk-time').value='';document.getElementById('f-otk-desc').value='';
    const{data,error}=await db.from('otk').insert({room:roomRaw,description:desc,scheduled_time:timeVal||null,object_id:currentObjectId,author:'Мастер'}).select().single();
    otkItems=otkItems.filter(o=>o.id!==tempId);
    if(!error&&data)otkItems.unshift(data);
    renderOtk();
    if(!error)showToast('\u2713 Запись добавлена');else showToast('Ошибка: '+error.message);
  }
  btn.disabled=false;
}


  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  }

function showToast(msg){
  const old=document.querySelector('.toast');if(old)old.remove();
  const t=document.createElement('div');t.className='toast';t.innerHTML=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2200);
}
